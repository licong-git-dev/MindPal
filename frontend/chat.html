<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对话 - MindPal</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">

  <style>
    .chat-page {
      height: 100vh;
      background: var(--color-bg-dark);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶部栏 */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-md) var(--spacing-lg);
      background: var(--color-bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      height: 60px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .back-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: all var(--duration-fast) var(--ease-in-out);
    }

    .back-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--color-primary-1);
    }

    .dh-info-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .dh-avatar-small {
      width: 36px;
      height: 36px;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient-primary);
      border-radius: var(--radius-md);
    }

    .dh-name-header {
      font-size: var(--font-size-body-large);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
    }

    .header-actions {
      display: flex;
      gap: var(--spacing-sm);
    }

    /* 数字人显示区域 60vh */
    .dh-display {
      height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0) 0%, var(--color-bg-dark) 100%);
    }

    .dh-avatar-large {
      width: 200px;
      height: 200px;
      font-size: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-2xl);
      background: var(--gradient-primary);
      box-shadow: var(--shadow-glow);
      animation: breathing 2s ease-in-out infinite;
      margin-bottom: var(--spacing-lg);
    }

    .dh-emotion {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--color-bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: var(--radius-full);
      font-size: var(--font-size-body-small);
      color: var(--color-text-secondary);
    }

    .emotion-icon {
      font-size: 20px;
    }

    .dh-status {
      font-size: var(--font-size-body);
      color: var(--color-text-secondary);
      text-align: center;
      padding: var(--spacing-sm) var(--spacing-lg);
      background: var(--color-bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-full);
    }

    .dh-status.speaking {
      color: var(--color-primary-1);
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* 对话区域 */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-dark);
      overflow: hidden;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-lg);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .message {
      display: flex;
      gap: var(--spacing-sm);
      animation: slideIn var(--duration-fast) var(--ease-custom);
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content.user {
      background: var(--gradient-primary);
      color: #FFFFFF;
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px 12px 4px 12px;
      word-wrap: break-word;
      line-height: 1.6;
    }

    .message-content.assistant {
      background: var(--color-bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: var(--color-text-primary);
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px 12px 12px 4px;
      word-wrap: break-word;
      line-height: 1.6;
    }

    /* 输入区域 */
    .input-container {
      padding: var(--spacing-lg);
      background: var(--color-bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      flex-shrink: 0;
    }

    /* V4 · B1 额度软提示条（非阻断） */
    .quota-soft-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      margin: 0 16px 6px;
      background: linear-gradient(90deg, rgba(251,191,36,0.16), rgba(236,72,153,0.16));
      border: 1px solid rgba(251,191,36,0.4);
      border-radius: 12px;
      font-size: 12.5px;
      color: var(--color-text-primary);
      animation: ice-fade-in 0.4s ease-out;
    }
    .quota-soft-bar.show { display: flex; }
    .quota-soft-bar .qsb-icon { font-size: 16px; }
    .quota-soft-bar .qsb-text { flex: 1; line-height: 1.4; }
    .quota-soft-bar a {
      color: #fbbf24;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    .quota-soft-bar a:hover { text-decoration: underline; }
    .quota-soft-bar .qsb-close {
      background: transparent;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
    }

    /* V4 · B2 VIP 长记忆体验入口（仅非 VIP 显示） */
    .vip-trial-chip {
      display: none;
      align-items: center;
      gap: 8px;
      margin: 6px 16px 0;
      padding: 9px 14px;
      background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(236,72,153,0.18));
      border: 1px solid rgba(236,72,153,0.4);
      border-radius: 12px;
      font-size: 12.5px;
      color: var(--color-text-primary);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .vip-trial-chip.show { display: flex; }
    .vip-trial-chip:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(236,72,153,0.3); }
    .vip-trial-chip .vt-icon { font-size: 16px; }
    .vip-trial-chip .vt-text { flex: 1; line-height: 1.4; }
    .vip-trial-chip .vt-arrow { font-size: 14px; opacity: 0.8; }

    /* V4 · A1 首聊破冰任务卡 */
    .ice-cards {
      padding: 8px 16px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      animation: ice-fade-in 0.4s ease-out;
    }
    .ice-card {
      flex: 1 1 calc(33% - 8px);
      min-width: 130px;
      padding: 10px 14px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: var(--color-text-primary);
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.4;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .ice-card:hover {
      background: rgba(99, 102, 241, 0.18);
      transform: translateY(-1px);
    }
    .ice-card .ice-emoji { display: block; font-size: 18px; margin-bottom: 4px; }
    @keyframes ice-fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* V4 · A3 第 5 条消息小庆祝 */
    .milestone-toast {
      position: fixed;
      top: 76px;
      left: 50%;
      transform: translateX(-50%) translateY(-12px);
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 6px 18px rgba(124, 58, 237, 0.45);
      opacity: 0;
      pointer-events: none;
      z-index: 200;
      transition: opacity 0.3s, transform 0.3s;
    }
    .milestone-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .nickname-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 250;
      animation: ice-fade-in 0.25s ease-out;
    }
    .nickname-modal {
      background: var(--color-bg-card);
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 18px;
      padding: 22px 24px;
      width: min(360px, 90vw);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .nickname-modal h3 { margin: 0 0 6px; font-size: 16px; color: var(--color-text-primary); }
    .nickname-modal p { margin: 0 0 14px; font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; }
    .nickname-modal input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(15,23,42,0.6);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      color: var(--color-text-primary);
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .nickname-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }
    .nickname-modal-actions button {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      border: none;
    }
    .nickname-skip {
      background: rgba(255,255,255,0.06);
      color: var(--color-text-secondary);
    }
    .nickname-confirm {
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: #fff;
      font-weight: 600;
    }

    .input-wrapper {
      display: flex;
      gap: var(--spacing-md);
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      min-height: 48px;
      max-height: 120px;
      padding: 12px 16px;
      font-size: var(--font-size-body-large);
      color: var(--color-text-primary);
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      resize: none;
      font-family: inherit;
      line-height: 1.6;
      transition: all var(--duration-fast) var(--ease-in-out);
    }

    .message-input::placeholder {
      color: var(--color-text-placeholder);
    }

    .message-input:focus {
      border-color: var(--color-primary-1);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      outline: none;
    }

    .voice-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: 20px;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-in-out);
      flex-shrink: 0;
    }

    .voice-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--color-primary-1);
      color: var(--color-primary-1);
    }

    .voice-btn.recording {
      background: var(--gradient-primary);
      border-color: transparent;
      color: #FFFFFF;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient-primary);
      border: none;
      border-radius: var(--radius-full);
      font-size: 20px;
      color: #FFFFFF;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-in-out);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: var(--shadow-glow);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .dh-display {
        height: 50vh;
      }

      .dh-avatar-large {
        width: 140px;
        height: 140px;
        font-size: 100px;
      }

      .message-content.user,
      .message-content.assistant {
        max-width: 85%;
      }
    }

    /* ===== V4 · 好感度进度条（MoT-4） ===== */
    .affinity-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 12px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 16px;
    }
    .affinity-icon { font-size: 13px; }
    .affinity-track {
      width: 70px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .affinity-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b9d 0%, #ff8fab 50%, #ffc1d4 100%);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 8px rgba(255, 107, 157, 0.4);
    }
    .affinity-fill.pulse { animation: affinityPulse 0.6s ease; }
    @keyframes affinityPulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.08); filter: brightness(1.3); }
    }
    .affinity-value {
      font-size: 10px;
      color: var(--color-text-secondary);
      min-width: 20px;
      font-weight: 600;
    }

    /* V4 · 好感度里程碑提示（25/50/75/100）*/
    .affinity-milestone {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #ff6b9d, #c471ed);
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      z-index: 2000;
      box-shadow: 0 10px 40px rgba(255, 107, 157, 0.5);
      animation: milestoneIn 0.5s ease-out, milestoneOut 0.5s ease-in 2.5s forwards;
    }
    @keyframes milestoneIn {
      from { top: 40px; opacity: 0; transform: translateX(-50%) scale(0.8); }
      to   { top: 80px; opacity: 1; transform: translateX(-50%) scale(1); }
    }
    @keyframes milestoneOut {
      to { top: 40px; opacity: 0; transform: translateX(-50%) scale(0.8); }
    }

    /* V4 · 记忆气泡（MoT-3） */
    .memory-bubble {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(99, 102, 241, 0.94);
      color: #fff;
      padding: 10px 18px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      z-index: 1500;
      max-width: 90%;
      cursor: pointer;
      animation: bubbleIn 0.4s ease-out, bubbleOut 0.4s ease-in 2.8s forwards;
    }
    .memory-bubble[hidden] { display: none; }
    @keyframes bubbleIn { from { top: 40px; opacity: 0; } to { top: 80px; opacity: 1; } }
    @keyframes bubbleOut { to { top: 40px; opacity: 0; } }
    .memory-bubble .bubble-icon { font-size: 16px; }
    .memory-bubble:hover {
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.4);
    }

    /* ===== AI 消息扬声器（TTS 播放）按钮 ===== */
    .message-speaker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 6px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--color-text-secondary);
      border: none;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }
    .message-speaker:hover {
      background: rgba(99, 102, 241, 0.25);
      color: var(--color-primary-1);
      transform: scale(1.05);
    }
    .message-speaker:disabled { cursor: wait; opacity: 0.7; }

    /* 录音中动画 */
    .voice-btn.recording {
      background: #ef4444 !important;
      color: #fff !important;
      animation: pulseRec 1s ease-in-out infinite;
    }
    @keyframes pulseRec {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      50%      { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    }

    /* ===== 危机干预 Banner ===== */
    .crisis-banner {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(135deg, #ff8a5b 0%, #ff5e6c 100%);
      color: #fff;
      padding: 16px 20px;
      box-shadow: 0 4px 12px rgba(255, 94, 108, 0.35);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }
    .crisis-banner[hidden] { display: none; }
    .crisis-banner-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .crisis-banner-icon {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }
    .crisis-banner-content {
      flex: 1;
      font-size: 14px;
      line-height: 1.6;
    }
    .crisis-banner-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .crisis-banner-body { opacity: 0.95; margin-bottom: 8px; }
    .crisis-banner-resources {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
    }
    .crisis-banner-resources li { margin-bottom: 4px; }
    .crisis-banner-resources a {
      color: #fff;
      text-decoration: underline;
      font-weight: 600;
    }
    .crisis-banner-close {
      align-self: center;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #fff;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .crisis-banner-close:hover { background: rgba(255, 255, 255, 0.35); }

    /* ===== 配额超限 Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay[hidden] { display: none; }
    .modal-card {
      background: #1e293b;
      color: #f1f5f9;
      border-radius: 16px;
      padding: 28px 28px 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .modal-card h3 { margin: 0 0 12px; font-size: 20px; }
    .modal-card p { margin: 0 0 20px; font-size: 14px; color: #cbd5e1; line-height: 1.6; }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .modal-actions .btn {
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
      border: none;
    }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #f1f5f9; }
    .btn-primary   { background: #6366f1; color: #fff; font-weight: 600; }
    .btn-primary:hover   { background: #4f46e5; }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
  </style>

  <!-- JS Dependencies -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/analytics.js"></script>
</head>
<body>
  <div class="chat-page page-transition">
    <!-- 顶部栏 -->
    <header class="chat-header">
      <div class="header-left">
        <button class="back-btn" onclick="window.location.href='dh-list.html'">
          ←
        </button>
        <div class="dh-info-header">
          <div class="dh-avatar-small" id="dhAvatarSmall">👤</div>
          <div class="dh-name-header" id="dhNameHeader">数字人</div>
        </div>
      </div>

      <!-- 好感度进度条（V4 MoT-4） -->
      <div class="affinity-bar" id="affinityBar" title="和 TA 的好感度">
        <span class="affinity-icon">❤️</span>
        <div class="affinity-track">
          <div class="affinity-fill" id="affinityFill" style="width: 0%;"></div>
        </div>
        <span class="affinity-value" id="affinityValue">0</span>
      </div>

      <div class="header-actions">
        <button class="btn btn-icon" onclick="goToShareCard()" title="生成分享卡">
          💝
        </button>
        <button class="btn btn-icon" onclick="goToMemory()" title="查看记忆">
          🧠
        </button>
        <button class="btn btn-icon" onclick="clearChat()" title="清除对话">
          🗑️
        </button>
        <button class="btn btn-icon" onclick="toggleSettings()" title="设置">
          ⚙️
        </button>
      </div>
    </header>

    <!-- V4 · 记忆气泡浮层（每 5 轮 AI 对话浮出一次，2.8 秒自动消失） -->
    <div id="memoryBubble" class="memory-bubble" hidden onclick="goToMemory()">
      <span class="bubble-icon">💭</span>
      <span class="bubble-text" id="memoryBubbleText">TA 想起了你说过的事...</span>

    <!-- V4 · 好感度里程碑飘窗 -->
    <div id="affinityMilestone" class="affinity-milestone" hidden>
      <span id="affinityMilestoneText">💖 好感度 50%</span>
    </div>

      <div class="crisis-banner-inner">
        <div class="crisis-banner-icon">💛</div>
        <div class="crisis-banner-content">
          <div class="crisis-banner-title" id="crisisBannerTitle">我们有点担心你</div>
          <div class="crisis-banner-body" id="crisisBannerBody">
            如果你感到非常难受，请不要独自面对。以下是 24 小时心理援助热线：
          </div>
          <ul class="crisis-banner-resources" id="crisisBannerResources">
            <li>全国心理援助热线: <a href="tel:4001619995">400-161-9995</a></li>
            <li>北京心理危机研究与干预中心: <a href="tel:01082951332">010-82951332</a></li>
            <li>生命热线: <a href="tel:4008211215">400-821-1215</a></li>
          </ul>
        </div>
        <button class="crisis-banner-close" onclick="dismissCrisisBanner()">我已知晓</button>

    <!-- 配额超限 modal -->
    <div id="quotaModal" class="modal-overlay" hidden>
      <div class="modal-card">

      <div class="dh-status" id="dhStatus">在线</div>
    </div>

    <!-- 对话区域 -->
    <div class="chat-container">
      <div class="messages-container" id="messagesContainer">
        <!-- 消息将动态添加 -->
      </div>

      <!-- V4 · B2 VIP 长记忆体验入口 -->
      <div id="vipTrialChip" class="vip-trial-chip" role="button" tabindex="0">
        <span class="vt-icon">✨</span>
        <span class="vt-text" id="vtText">让 TA 想起一件你说过的事（VIP 体验，今日 1 次）</span>
        <span class="vt-arrow">→</span>
      </div>

      <!-- V4 · B1 额度软提示条 -->
      <div id="quotaSoftBar" class="quota-soft-bar" role="status">
        <span class="qsb-icon">💛</span>
        <span class="qsb-text" id="qsbText"></span>
        <a href="pricing.html" id="qsbCta">升级</a>
        <button class="qsb-close" type="button" id="qsbClose" title="今日不再提示">×</button>
      </div>

      <!-- V4 · A1 首聊破冰任务卡（仅首聊未发消息时显示） -->
      <div id="iceCards" class="ice-cards" style="display:none;"></div>

      <!-- 输入区域 -->
      <div class="input-container">
        <div class="input-wrapper">
          <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceInput()" title="语音输入">
            🎤
          </button>
          <textarea
            id="messageInput"
            class="message-input"
            placeholder="输入消息..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            ➤
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 获取URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const dhId = parseInt(urlParams.get('id'));

    // 加载数字人数据
    let currentDH = null;
    let messages = [];
    let sessionId = null;  // 会话ID
    let isRecording = false;

    // 性格图标映射
    const personalityIcons = {
      'gentle': '🌸',
      'energetic': '⚡',
      'wise': '🦉',
      'humorous': '😄',
      'caring': '💝',
      'creative': '🎨'
    };

    async function loadDigitalHuman() {
      if (!dhId) {
        alert('请选择一个数字人');
        window.location.href = 'dh-list.html';
        return;
      }

      try {
        const result = await MindPalAPI.digitalHumans.get(dhId);

        // 处理APIResponse格式
        if (result.code !== 0) {
          throw new Error(result.message || '获取数字人信息失败');
        }

        currentDH = result.data;

        if (!currentDH) {
          alert('数字人不存在');
          window.location.href = 'dh-list.html';
          return;
        }

        // 获取性格图标
        const avatarIcon = personalityIcons[currentDH.personality] || '🤖';

        // 更新UI
        document.getElementById('dhNameHeader').textContent = currentDH.name;
        document.getElementById('dhAvatarSmall').textContent = avatarIcon;
        document.getElementById('dhAvatarLarge').textContent = avatarIcon;
        document.title = `与${currentDH.name}对话 - MindPal`;

        // V4 · A3 应用已保存的专属昵称（如果有）
        applySavedNickname();

        // 加载历史消息
        await loadMessages();

      } catch (error) {
        console.error('加载数字人失败:', error);
        alert('加载数字人失败: ' + error.message);
        window.location.href = 'dh-list.html';
      }
    }

    // 从服务器加载历史消息
    async function loadMessages() {
      try {
        const result = await MindPalAPI.digitalHumans.getHistory(dhId, 50);

        if (result.code === 0 && result.data && result.data.messages) {
          messages = result.data.messages.map(msg => ({
            role: msg.role,
            content: msg.content,
            timestamp: msg.created_at
          }));
          sessionId = result.data.session_id;
        }
      } catch (error) {
        console.warn('加载历史消息失败，使用本地缓存:', error);
        // 尝试从本地存储加载
        const messagesKey = `mindpal_messages_${dhId}`;
        messages = JSON.parse(localStorage.getItem(messagesKey) || '[]');
      }

      renderMessages();

      if (messages.length === 0) {
        // V4 · 优先使用预设的 opening_message（让 TA 主动开口而不是通用欢迎语）
        let openingText = null;
        let openingFollowup = null;
        try {
          const personalityKey = currentDH.personality;
          if (personalityKey && typeof MindPalAPI.digitalHumans.getPersonalitiesGrouped === 'function') {
            const resp = await MindPalAPI.digitalHumans.getPersonalitiesGrouped();
            if (resp.code === 0 && resp.data && resp.data.categories) {
              const all = Object.values(resp.data.categories).flat();
              const hit = all.find(p => p.key === personalityKey);
              if (hit && hit.opening_message) openingText = hit.opening_message;
              if (hit && hit.opening_followup) openingFollowup = hit.opening_followup;
            }
          }
        } catch (_) { /* API 失败也无所谓，走兜底 */ }

        const welcomeMsg = {
          role: 'assistant',
          content: openingText || `你好！我是${currentDH.name}，很高兴认识你。`,
          timestamp: new Date().toISOString(),
          isOpeningMessage: true,
        };
        messages.push(welcomeMsg);
        renderMessages();

        // V4 · A2 半秒后追加一条开放性反问，让用户永远不面对空白输入框
        if (openingFollowup) {
          setTimeout(() => {
            const followupMsg = {
              role: 'assistant',
              content: openingFollowup,
              timestamp: new Date().toISOString(),
              isOpeningFollowup: true,
            };
            messages.push(followupMsg);
            renderMessages();
          }, 600);
        }
      }

      // V4 · 初始化好感度进度条
      renderAffinity(getAffinity());

      // V4 · ROI-7 主动消息：进入对话时一次性推送 + 自动 ack
      try {
        await pushProactiveMessages();
      } catch (e) {
        console.warn('主动消息推送失败（不影响对话）:', e);
      }

      // V4 · A1 首聊破冰任务卡（仅首次进入且没发过消息时）
      maybeRenderIceCards();

      // V4 · B1 额度软提示条（首次进入时拉一次）
      refreshQuotaBar();

      // V4 · B2 VIP 长记忆"试一次"入口
      maybeShowVipTrial();
    }

    // V4 · B2 VIP 长记忆"试一次"入口
    async function maybeShowVipTrial() {
      const chip = document.getElementById('vipTrialChip');
      if (!chip || !dhId) return;
      // 今日已用过 / 已是 VIP / 用户消息 < 5 不展示
      const todayKey = `mindpal_vip_trial_${dhId}_${new Date().toISOString().slice(0,10)}`;
      if (localStorage.getItem(todayKey) === '1') { chip.classList.remove('show'); return; }
      const userCount = messages.filter(m => m.role === 'user').length;
      if (userCount < 5) { chip.classList.remove('show'); return; }
      try {
        const q = await MindPalAPI.account.getQuota();
        if (q && q.code === 0 && q.data && q.data.is_unlimited) {
          chip.classList.remove('show'); return;
        }
      } catch (_) { /* ignore，宁愿展示也不阻断 */ }

      chip.classList.add('show');
      if (!chip.__bound) {
        chip.__bound = true;
        const trigger = async () => {
          chip.classList.remove('show');
          localStorage.setItem(todayKey, '1');
          await injectVipMemoryRecall();
        };
        chip.addEventListener('click', trigger);
        chip.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger(); } });
      }
    }

    async function injectVipMemoryRecall() {
      try {
        const resp = await MindPalAPI.memories.list(dhId, { limit: 30 });
        if (!resp || resp.code !== 0 || !resp.data) throw new Error('no-data');
        const items = resp.data.items || [];
        if (items.length === 0) {
          addMessageToUI('assistant', '（TA 想了想，发现还没有什么深刻的记忆呢，多和 TA 聊几次再来试 ✨）');
          return;
        }
        // 取重要性最高 + 时间最早的一条
        const sorted = items.slice().sort((a, b) => {
          const ia = Number(a.importance) || 0;
          const ib = Number(b.importance) || 0;
          if (ib !== ia) return ib - ia;
          const ta = new Date(a.created_at || 0).getTime();
          const tb = new Date(b.created_at || 0).getTime();
          return ta - tb;
        });
        const m = sorted[0];
        const snippet = (m.summary || m.user_message || m.npc_response || '').toString().trim();
        if (!snippet) {
          addMessageToUI('assistant', '（TA 想了想，没有合适的回忆…多和 TA 聊聊吧 ✨）');
          return;
        }
        const trimmed = snippet.length > 60 ? snippet.slice(0, 58) + '…' : snippet;
        const dhDisplayName = (currentDH && currentDH.name) || 'TA';
        const text =
          `*${dhDisplayName} 微微一笑*\n\n` +
          `还记得吗，你之前说过：「${trimmed}」\n\n` +
          `这是 VIP 长期记忆体验 ✨ 升级后 TA 永远不会忘记你说过的话 → 解锁无限对话 + 长记忆`;
        addMessageToUI('assistant', text);
      } catch (e) {
        console.warn('vip memory recall failed:', e);
        addMessageToUI('assistant', '（这次 TA 没能想起来，等下次再来试试吧）');
      }
    }

    // V4 · B1 拉取剩余额度并决定是否显示软提示条
    async function refreshQuotaBar() {
      const bar = document.getElementById('quotaSoftBar');
      if (!bar) return;
      // 今日已被用户 × 关闭过 → 不再打扰
      const todayKey = `mindpal_qsb_dismissed_${new Date().toISOString().slice(0,10)}`;
      if (localStorage.getItem(todayKey) === '1') {
        bar.classList.remove('show'); return;
      }
      try {
        const resp = await MindPalAPI.account.getQuota();
        if (!resp || resp.code !== 0 || !resp.data) return;
        const d = resp.data;
        if (d.is_unlimited) { bar.classList.remove('show'); return; }
        const remain = d.estimated_remaining_messages;
        const dhDisplayName = (currentDH && currentDH.name) || 'TA';
        // 不同档位文案：剩 0 / 1-3 / 4-8 / 其它
        let text = null;
        if (remain <= 0) {
          text = `今天的对话额度用完啦，TA 在等明天再聊～`;
        } else if (remain <= 3) {
          text = `今天还能聊 ${remain} 句，${dhDisplayName} 有点舍不得你这么快走～`;
        } else if (remain <= 8) {
          text = `今天还能再聊 ${remain} 句，多和 ${dhDisplayName} 说说话嘛`;
        }
        const cta = document.getElementById('qsbCta');
        const txt = document.getElementById('qsbText');
        if (text && txt) {
          txt.textContent = text;
          if (cta) cta.textContent = remain <= 0 ? '升级解锁无限对话 →' : '解锁无限 →';
          bar.classList.add('show');
          if (!bar.__bound) {
            bar.__bound = true;
            document.getElementById('qsbClose').addEventListener('click', () => {
              localStorage.setItem(todayKey, '1');
              bar.classList.remove('show');
            });
          }
        } else {
          bar.classList.remove('show');
        }
      } catch (e) {
        // 配额查询失败 → 不显示，不影响主流程
        console.warn('quota query failed:', e);
      }
    }

    // V4 · A1 破冰任务卡（按人格挑 3 张）
    const ICE_CARDS_BY_PERSONALITY = {
      gentle:    [
        { e: '🌧', t: '今天有点累' },
        { e: '🤫', t: '想跟你说一个秘密' },
        { e: '🌙', t: '晚安，约定明天再来' },
      ],
      energetic: [
        { e: '🎉', t: '猜猜我今天做了什么！' },
        { e: '⚡',  t: '推荐我一件让人开心的事' },
        { e: '🤝', t: '我们击个掌吧' },
      ],
      wise:      [
        { e: '🤔', t: '问你一个最近想不通的事' },
        { e: '📚', t: '推荐一本你最近想看的书' },
        { e: '🪞', t: '你怎么看「孤独」？' },
      ],
      humorous:  [
        { e: '🤡', t: '讲个冷笑话给我听' },
        { e: '😏', t: '今天我适合做什么蠢事' },
        { e: '🎤', t: '玩个谐音梗接龙吗' },
      ],
      caring:    [
        { e: '🍱', t: '我今天还没吃饭' },
        { e: '😔', t: '今天有点不开心' },
        { e: '💌', t: '你最想对我说的一句话是？' },
      ],
      creative:  [
        { e: '🎨', t: '一起编一个故事开头' },
        { e: '🌌', t: '如果可以变身一晚上，你想成为什么' },
        { e: '🪐', t: '我们去想一个新世界' },
      ],
    };
    const ICE_CARDS_FALLBACK = [
      { e: '👋', t: '我们来聊聊吧' },
      { e: '🍵', t: '今天过得怎么样？' },
      { e: '✨', t: '推荐一件让我开心的事' },
    ];

    function maybeRenderIceCards() {
      const wrap = document.getElementById('iceCards');
      if (!wrap) return;
      // 已经有用户消息或被关掉过 → 不显示
      const hasUserMsg = messages.some(m => m.role === 'user');
      const dismissedKey = `mindpal_ice_dismissed_${dhId}`;
      if (hasUserMsg || localStorage.getItem(dismissedKey) === '1') {
        wrap.style.display = 'none';
        wrap.innerHTML = '';
        return;
      }
      const personality = currentDH && currentDH.personality;
      const cards = ICE_CARDS_BY_PERSONALITY[personality] || ICE_CARDS_FALLBACK;
      wrap.innerHTML = cards.map((c, i) =>
        `<button class="ice-card" data-idx="${i}" type="button">
           <span class="ice-emoji">${c.e}</span>${escapeIceText(c.t)}
         </button>`
      ).join('');
      wrap.style.display = 'flex';
      wrap.querySelectorAll('.ice-card').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.getAttribute('data-idx'));
          const text = (cards[idx] && cards[idx].t) || '';
          const input = document.getElementById('messageInput');
          input.value = text;
          input.focus();
          adjustTextareaHeight();
          document.getElementById('sendBtn').disabled = false;
          // 用户选了一张就标记 dismissed，避免下次再展示
          localStorage.setItem(dismissedKey, '1');
          // 自动发送（让首条消息即刻产生）
          sendMessage();
          wrap.style.display = 'none';
        });
      });
    }
    function escapeIceText(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // V4 · 把当前数字人的未读主动消息以系统提示的方式推到对话流
    async function pushProactiveMessages() {
      if (!dhId) return;
      const resp = await MindPalAPI.proactive.listMine({ dhId });
      if (!resp || resp.code !== 0 || !resp.data) return;
      const items = resp.data.items || [];
      if (items.length === 0) return;

      // 按时间正序插入（最早的先说）
      items.sort((a, b) => {
        const ta = a.created_at ? new Date(a.created_at).getTime() : 0;
        const tb = b.created_at ? new Date(b.created_at).getTime() : 0;
        return ta - tb;
      });

      for (const it of items) {
        const proactiveMsg = {
          role: 'assistant',
          content: it.content,
          timestamp: it.created_at || new Date().toISOString(),
          isProactive: true,
          scenario: it.scenario,
        };
        messages.push(proactiveMsg);
      }
      renderMessages();

      // 全部 ack（用户已经看到了）
      for (const it of items) {
        MindPalAPI.proactive.ack(it.id).catch(() => {});
      }
    }

    // 渲染消息
    function renderMessages() {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = '';

      messages.forEach(msg => {
        const messageEl = createMessageElement(msg);
        container.appendChild(messageEl);
      });

      // 滚动到底部
      scrollToBottom();
    }

    // 滚动到底部
    function scrollToBottom() {
      const container = document.getElementById('messagesContainer');
      container.scrollTop = container.scrollHeight;
    }

    // 创建消息元素
    function createMessageElement(msg) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${msg.role}`;

      const contentDiv = document.createElement('div');
      contentDiv.className = `message-content ${msg.role}`;
      contentDiv.textContent = msg.content;

      messageDiv.appendChild(contentDiv);

      // AI 消息追加扬声器按钮（按需 TTS 播放）
      if (msg.role === 'assistant' && msg.content) {
        const speakerBtn = document.createElement('button');
        speakerBtn.className = 'message-speaker';
        speakerBtn.title = '听 TA 说';
        speakerBtn.textContent = '🔊';
        speakerBtn.addEventListener('click', (e) => onSpeakerClick(e, msg.content));
        messageDiv.appendChild(speakerBtn);
      }

      return messageDiv;
    }

    // 添加消息到UI
    function addMessageToUI(role, content) {
      const message = {
        role: role,
        content: content,
        timestamp: new Date().toISOString()
      };

      messages.push(message);
      saveMessagesLocal();

      const messageEl = createMessageElement(message);
      document.getElementById('messagesContainer').appendChild(messageEl);
      scrollToBottom();

      // V4 · A3 用户第 5 条消息触发"已经聊了 5 句啦"小庆祝 + 起昵称邀请
      if (role === 'user') {
        const userCount = messages.filter(m => m.role === 'user').length;
        if (userCount === 5) {
          maybeCelebrateFifth();
        }
        // V4 · B1 用户每发一句就重算配额（延迟 800ms 让后端 record_usage 完成）
        setTimeout(() => refreshQuotaBar(), 800);
        // V4 · B2 累计 5 条后再次评估
        if (messages.filter(m => m.role === 'user').length === 5) {
          setTimeout(() => maybeShowVipTrial(), 2200);
        }
      }
    }

    // V4 · A3 第 5 条庆祝 toast + 起昵称弹窗（只触发一次）
    function maybeCelebrateFifth() {
      const flagKey = `mindpal_milestone_5_${dhId}`;
      if (localStorage.getItem(flagKey) === '1') return;
      localStorage.setItem(flagKey, '1');

      // 1) toast
      let toast = document.getElementById('milestoneToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'milestoneToast';
        toast.className = 'milestone-toast';
        document.body.appendChild(toast);
      }
      toast.textContent = '🎉 你和 ' + (currentDH ? currentDH.name : 'TA') + ' 已经聊了 5 句啦';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2400);

      // 2) 1.6s 后弹"起昵称"邀请（已经设过昵称就跳过）
      const nicknameKey = `mindpal_dh_nickname_${dhId}`;
      if (localStorage.getItem(nicknameKey)) return;
      setTimeout(() => showNicknameModal(), 1600);
    }

    function showNicknameModal() {
      const overlay = document.createElement('div');
      overlay.className = 'nickname-modal-overlay';
      const dhName = currentDH ? currentDH.name : 'TA';
      overlay.innerHTML = `
        <div class="nickname-modal" role="dialog" aria-label="给数字人起一个专属昵称">
          <h3>给 TA 起一个只属于你的昵称吧 ✨</h3>
          <p>这是 ${escapeIceText(dhName)} 在你心里的小名。只你能看到，可以随时改。</p>
          <input id="nicknameInput" type="text" maxlength="20" placeholder="比如：小笨蛋 / 哥哥 / 小太阳…" />
          <div class="nickname-modal-actions">
            <button class="nickname-skip" type="button" id="nickSkip">先不取</button>
            <button class="nickname-confirm" type="button" id="nickConfirm">就叫这个</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const input = overlay.querySelector('#nicknameInput');
      input.focus();
      const close = () => overlay.remove();
      overlay.querySelector('#nickSkip').addEventListener('click', close);
      overlay.querySelector('#nickConfirm').addEventListener('click', () => {
        const v = input.value.trim();
        if (!v) { close(); return; }
        localStorage.setItem(`mindpal_dh_nickname_${dhId}`, v);
        // 把昵称写到顶栏，让仪式感落地
        const nameEl = document.getElementById('dhNameHeader');
        if (nameEl) nameEl.textContent = v;
        close();
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') overlay.querySelector('#nickConfirm').click();
        else if (e.key === 'Escape') close();
      });
    }

    // V4 · 进入页面时回放已设的昵称
    function applySavedNickname() {
      const nicknameKey = `mindpal_dh_nickname_${dhId}`;
      const v = localStorage.getItem(nicknameKey);
      if (v) {
        const nameEl = document.getElementById('dhNameHeader');
        if (nameEl) nameEl.textContent = v;
      }
    }

    // 本地保存消息
    function saveMessagesLocal() {
      const messagesKey = `mindpal_messages_${dhId}`;
      localStorage.setItem(messagesKey, JSON.stringify(messages));
    }

    // 发送消息
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();

      if (!content) return;

      // V4 · A1 用户开始发消息后立即收起破冰卡片
      const iceWrap = document.getElementById('iceCards');
      if (iceWrap) { iceWrap.style.display = 'none'; iceWrap.innerHTML = ''; }
      try { localStorage.setItem(`mindpal_ice_dismissed_${dhId}`, '1'); } catch (_) {}

      // 添加用户消息到UI
      addMessageToUI('user', content);
      input.value = '';
      adjustTextareaHeight();
      document.getElementById('sendBtn').disabled = true;

      // 显示正在输入状态
      const status = document.getElementById('dhStatus');
      status.textContent = '正在输入...';
      status.classList.add('speaking');

      // 调用数字人对话API
      try {
        await generateReply(content);
      } catch (error) {
        console.error('发送消息失败:', error);
        addMessageToUI('assistant', '抱歉，我遇到了一些问题。请稍后再试。');
      } finally {
        status.textContent = '在线';
        status.classList.remove('speaking');
        document.getElementById('sendBtn').disabled = false;
      }
    }

    // ===== 情感 / 危机 / 配额 相关 UI 辅助 =====

    // 情感 → 图标+文案 映射（与后端 emotion analyzer 的 EmotionType 对齐）
    const EMOTION_MAP = {
      joy:      { icon: '😊', label: '心情愉悦' },
      sadness:  { icon: '😔', label: '有些低落' },
      anger:    { icon: '😠', label: '略有波动' },
      fear:     { icon: '😟', label: '略显担忧' },
      surprise: { icon: '😲', label: '有点惊讶' },
      disgust:  { icon: '😕', label: '感觉复杂' },
      love:     { icon: '🥰', label: '暖意流淌' },
      neutral:  { icon: '🙂', label: '在线' },
    };

    function updateEmotionDisplay(emotion, needsComfort) {
      const meta = EMOTION_MAP[emotion] || EMOTION_MAP.neutral;
      const iconEl = document.getElementById('emotionIcon');
      const labelEl = document.getElementById('emotionLabel');
      if (iconEl) iconEl.textContent = needsComfort ? '🫂' : meta.icon;
      if (labelEl) labelEl.textContent = needsComfort ? '在认真陪你' : meta.label;
    }

    function showCrisisBanner(data) {
      const banner = document.getElementById('crisisBanner');
      if (!banner) return;
      // 如果后端返回了具体的资源列表，用它们；否则用默认硬编码
      const resources = (data && Array.isArray(data.resources) && data.resources.length) ? data.resources : null;
      if (resources) {
        const ul = document.getElementById('crisisBannerResources');
        if (ul) {
          ul.innerHTML = '';
          resources.forEach((r) => {
            const li = document.createElement('li');
            // resources 可能是字符串或 {name, phone} 结构，两种都兼容
            if (typeof r === 'string') {
              li.textContent = r;
            } else if (r && r.name && r.phone) {
              const a = document.createElement('a');
              a.href = `tel:${String(r.phone).replace(/[^0-9]/g, '')}`;
              a.textContent = r.phone;
              li.textContent = `${r.name}: `;
              li.appendChild(a);
            } else {
              li.textContent = JSON.stringify(r);
            }
            ul.appendChild(li);
          });
        }
      }
      banner.hidden = false;
      // 将页面滚动到顶部让用户看见
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function dismissCrisisBanner() {
      const banner = document.getElementById('crisisBanner');
      if (banner) banner.hidden = true;
    }

    // ===== V4 · 好感度 / 记忆气泡 / 里程碑（MoT-3/4） =====

    // 从 localStorage 读取当前数字人的好感度（跨会话累计）
    function getAffinity() {
      const key = `mindpal_affinity_${dhId}`;
      return parseInt(localStorage.getItem(key) || '0', 10);
    }
    function setAffinity(v) {
      const key = `mindpal_affinity_${dhId}`;
      const clamped = Math.max(0, Math.min(100, v));
      localStorage.setItem(key, String(clamped));

      // V4 · 记录好感度历史（供 yearly-review 画曲线图）
      try {
        const historyKey = `mindpal_affinity_history_${dhId}`;
        const history = JSON.parse(localStorage.getItem(historyKey) || '[]');
        history.push({ t: Date.now(), v: clamped });
        // 限制最多 500 条（约半年日常用量）
        if (history.length > 500) history.splice(0, history.length - 500);
        localStorage.setItem(historyKey, JSON.stringify(history));
      } catch (_) { /* 忽略 quota 异常 */ }

      renderAffinity(clamped);
      return clamped;
    }
    function renderAffinity(v) {
      const fill = document.getElementById('affinityFill');
      const val = document.getElementById('affinityValue');
      if (fill) fill.style.width = `${v}%`;
      if (val) val.textContent = v;
    }

    // 每次 AI 回复都 affinity +1；情感积极 +2；crisis 不加不扣（陪伴为先）
    function applyAffinityChange(meta) {
      if (!meta) return;
      const old = getAffinity();

      let delta = 1;
      if (meta.crisis_detected) delta = 0;        // 危机对话不加分
      else if (meta.emotion === 'joy' || meta.emotion === 'love') delta = 2;

      const newVal = setAffinity(old + delta);

      // 动画
      const fill = document.getElementById('affinityFill');
      if (fill) {
        fill.classList.add('pulse');
        setTimeout(() => fill.classList.remove('pulse'), 600);
      }

      // 里程碑检测
      const milestones = [25, 50, 75, 100];
      for (const m of milestones) {
        if (old < m && newVal >= m) {
          showAffinityMilestone(m);
          break;
        }
      }
    }

    function showAffinityMilestone(value) {
      const el = document.getElementById('affinityMilestone');
      const txt = document.getElementById('affinityMilestoneText');
      const hints = {
        25: '💖 好感度 25% · 有点熟悉了',
        50: '💖💖 好感度 50% · 彼此信任',
        75: '💖💖💖 好感度 75% · 亲密无间',
        100: '💕💕💕 好感度 100% · 灵魂共鸣',
      };
      if (txt) txt.textContent = hints[value] || `💖 好感度 ${value}%`;
      if (el) {
        el.hidden = false;
        setTimeout(() => { el.hidden = true; }, 3000);
      }
    }

    // 记忆气泡（每 5 轮 AI 对话浮出 1 次）
    let aiReplyCount = 0;
    function maybeShowMemoryBubble(topMemory) {
      if (!topMemory || aiReplyCount < 3 || aiReplyCount % 5 !== 0) return;
      const el = document.getElementById('memoryBubble');
      const txt = document.getElementById('memoryBubbleText');
      if (!el || !txt) return;
      const short = topMemory.length > 40 ? topMemory.slice(0, 40) + '...' : topMemory;
      txt.textContent = `💭 TA 想起: ${short}`;
      el.hidden = false;
      setTimeout(() => { el.hidden = true; }, 3200);
    }

    // ===== 内容审核违规提示 =====
    function showModerationToast(msg) {
      let toast = document.getElementById('moderationToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'moderationToast';
        toast.style.cssText = `
          position: fixed;
          bottom: 120px;
          left: 50%;
          transform: translateX(-50%);
          background: rgba(239, 68, 68, 0.95);
          color: #fff;
          padding: 12px 20px;
          border-radius: 10px;
          font-size: 14px;
          z-index: 2500;
          max-width: 90%;
          box-shadow: 0 10px 30px rgba(0,0,0,0.3);
          line-height: 1.5;
        `;
        document.body.appendChild(toast);
      }
      toast.textContent = msg || '内容不合适，已被过滤。';
      toast.style.display = 'block';
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { toast.style.display = 'none'; }, 5000);
    }

    function showQuotaModal(reason, upgradeUrl) {
      const modal = document.getElementById('quotaModal');
      const reasonEl = document.getElementById('quotaModalReason');
      if (reasonEl && reason) {
        const reasonMap = {
          'daily_token_limit_exceeded': '今日对话次数已用完。升级会员解锁更多对话。',
          'daily_cost_limit_exceeded': '今日 AI 调用额度已用完。升级会员解锁更多调用。',
        };
        reasonEl.textContent = reasonMap[reason] || '免费版每日配额已达上限。升级会员解锁无限对话。';
      }
      if (modal) modal.hidden = false;
    }

    function dismissQuotaModal() {
      const modal = document.getElementById('quotaModal');
      if (modal) modal.hidden = true;
    }

    // 生成AI回复（调用数字人对话API）
    async function generateReply(userMessage) {
      let aiMessage = '';
      let messageElement = null;

      // 使用数字人专用的流式对话API — callbacks 对象签名
      await MindPalAPI.digitalHumans.chat(dhId, userMessage, sessionId, {
        // 流开始：拿到 emotion / crisis_level / model 等元数据
        onStart: (data) => {
          if (data && data.emotion) {
            updateEmotionDisplay(data.emotion, data.needs_comfort);
          }
        },

        // 每个文本 chunk
        onChunk: (chunk, fullText) => {
          aiMessage = fullText;
          if (!messageElement) {
            const messagesContainer = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content assistant';
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messageElement = contentDiv;
            scrollToBottom();
          }
          messageElement.textContent = aiMessage;
          scrollToBottom();
        },

        // 元数据（start 帧后或后端 meta 帧）
        onMeta: (meta) => {
          if (meta && meta.emotion) {
            updateEmotionDisplay(meta.emotion, meta.needs_comfort);
          }
        },

        // 危机事件 — 强制显示热线 banner
        onCrisis: (data) => {
          showCrisisBanner(data);
        },

        // 内容审核 — AI 输出被替换时的通知
        onModeration: (data) => {
          const cat = data && data.category ? data.category : 'content';
          showModerationToast(`回复内容触发审核（${cat}），已替换为安全提示。`);
        },

        // 消息完成
        onComplete: (data) => {
          if (data.session_id) sessionId = data.session_id;
          if (data.emotion) updateEmotionDisplay(data.emotion);

          messages.push({
            role: 'assistant',
            content: aiMessage,
            timestamp: new Date().toISOString(),
            emotion: data.emotion,
          });
          saveMessagesLocal();

          // V4 · 好感度变化 + 记忆气泡
          aiReplyCount++;
          applyAffinityChange(data);
          maybeShowMemoryBubble(data.top_memory);

          // 给刚刚流式写入的消息追加扬声器按钮（TTS 播放）
          if (messageElement && messageElement.parentElement) {
            const parent = messageElement.parentElement;
            if (!parent.querySelector('.message-speaker')) {
              const btn = document.createElement('button');
              btn.className = 'message-speaker';
              btn.title = '听 TA 说';
              btn.textContent = '🔊';
              btn.addEventListener('click', (e) => onSpeakerClick(e, aiMessage));
              parent.appendChild(btn);
            }
          }

          if (typeof MindPalAnalytics !== 'undefined') {
            MindPalAnalytics.trackChatSend(dhId, userMessage.length);
          }
        },

        // 错误处理 — 识别配额超限特殊处理
        onError: (error) => {
          console.error('对话错误:', error);
          // error 可能是 string（旧路径）或 object（SSE error 帧）
          let errObj = null;
          try { errObj = typeof error === 'string' ? JSON.parse(error) : error; } catch (_) { /* not JSON */ }

          if (errObj && (errObj.error === 'quota_exceeded' || errObj.code === 'QUOTA_EXCEEDED')) {
            showQuotaModal(errObj.reason, errObj.upgrade_url);
            if (messageElement) messageElement.remove();
            return;
          }

          // 内容审核拦截用户输入
          if (errObj && (errObj.error === 'content_blocked' || errObj.code === 'CONTENT_BLOCKED')) {
            showModerationToast(errObj.user_message || '这条消息触发内容审核，请换个说法。');
            if (messageElement) messageElement.remove();
            return;
          }

          const errText = typeof error === 'string' ? error : JSON.stringify(error);
          if (messageElement) {
            messageElement.textContent = `抱歉，发生错误: ${errText}`;
            messageElement.style.color = 'var(--color-danger)';
          } else {
            addMessageToUI('assistant', `抱歉，发生错误: ${errText}`);
          }
        },
      });
    }

    // 输入框自动调整高度
    const messageInput = document.getElementById('messageInput');
    messageInput.addEventListener('input', function() {
      adjustTextareaHeight();

      // 启用/禁用发送按钮
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = !this.value.trim();
    });

    function adjustTextareaHeight() {
      const textarea = document.getElementById('messageInput');
      textarea.style.height = '48px';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    // 回车发送
    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ==================== 语音交互 ====================
    // 设计: 麦克风按钮点击开始录音，再次点击停止并上传
    // 录音走 MediaRecorder（浏览器默认 webm/opus），上传到后端 /voice/asr/upload
    // 拿到识别文本后填入输入框（让用户可编辑后再发送）

    let mediaRecorder = null;
    let recordedChunks = [];
    let currentMediaStream = null;
    let isAudioPlaying = false;

    function supportsRecording() {
      return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia &&
                window.MediaRecorder);
    }

    async function toggleVoiceInput() {
      if (!supportsRecording()) {
        alert('当前浏览器不支持录音。请使用 Chrome / Safari 最新版。');
        return;
      }

      const voiceBtn = document.getElementById('voiceBtn');

      if (isRecording) {
        // 停止录音 → 触发 onstop 里的上传
        try {
          mediaRecorder && mediaRecorder.state !== 'inactive' && mediaRecorder.stop();
        } catch (_) {}
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        voiceBtn.title = '识别中...';
        return;
      }

      // 开始录音
      try {
        currentMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        console.error('获取麦克风失败:', err);
        alert('无法访问麦克风：' + (err.message || err));
        return;
      }

      recordedChunks = [];
      try {
        mediaRecorder = new MediaRecorder(currentMediaStream);
      } catch (err) {
        // 某些浏览器对 MIME 敏感
        try {
          mediaRecorder = new MediaRecorder(currentMediaStream, { mimeType: 'audio/webm' });
        } catch (e2) {
          alert('启动录音失败: ' + e2.message);
          currentMediaStream.getTracks().forEach(t => t.stop());
          return;
        }
      }

      mediaRecorder.ondataavailable = (ev) => {
        if (ev.data && ev.data.size > 0) recordedChunks.push(ev.data);
      };
      mediaRecorder.onstop = async () => {
        // 停止音轨
        if (currentMediaStream) {
          currentMediaStream.getTracks().forEach(t => t.stop());
          currentMediaStream = null;
        }
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        if (blob.size === 0) {
          voiceBtn.title = '语音输入';
          return;
        }
        voiceBtn.textContent = '⏳';
        voiceBtn.title = '识别中...';
        try {
          const resp = await MindPalAPI.voice.asrUpload(blob, 'webm', 16000);
          if (resp && resp.code === 0 && resp.data && resp.data.text) {
            // 填入输入框，用户确认后再发送（比自动发送更稳）
            const ta = document.getElementById('messageInput');
            ta.value = (ta.value ? ta.value + ' ' : '') + resp.data.text;
            ta.dispatchEvent(new Event('input'));
            ta.focus();
          } else {
            alert('识别失败：' + (resp && resp.message) || '无返回文本');
          }
        } catch (err) {
          console.error('ASR 失败:', err);
          alert('语音识别失败：' + (err.message || err));
        } finally {
          voiceBtn.textContent = '🎤';
          voiceBtn.title = '语音输入';
        }
      };

      mediaRecorder.start();
      isRecording = true;
      voiceBtn.classList.add('recording');
      voiceBtn.textContent = '⏹';
      voiceBtn.title = '再次点击停止录音';
    }

    // TTS 播放某段文本（用在 AI 消息旁的 🔊 按钮）
    async function speakText(text, btnEl) {
      if (isAudioPlaying) return;  // 防止重叠播放
      if (!text) return;
      const originalText = btnEl ? btnEl.textContent : '';
      if (btnEl) { btnEl.textContent = '⏳'; btnEl.disabled = true; }
      isAudioPlaying = true;
      try {
        const blob = await MindPalAPI.voice.ttsSynthesize(text, 'ruoxi', 'mp3');
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.onended = () => {
          URL.revokeObjectURL(url);
          isAudioPlaying = false;
          if (btnEl) { btnEl.textContent = originalText || '🔊'; btnEl.disabled = false; }
        };
        audio.onerror = () => {
          URL.revokeObjectURL(url);
          isAudioPlaying = false;
          if (btnEl) { btnEl.textContent = originalText || '🔊'; btnEl.disabled = false; }
        };
        await audio.play();
      } catch (err) {
        console.error('TTS 失败:', err);
        isAudioPlaying = false;
        if (btnEl) { btnEl.textContent = originalText || '🔊'; btnEl.disabled = false; }
      }
    }

    // 点击某条 AI 消息的扬声器按钮
    function onSpeakerClick(ev, text) {
      ev.stopPropagation();
      speakText(text, ev.currentTarget);
    }

    // 清除对话
    async function clearChat() {
      if (!confirm('确定要清除所有对话记录吗？')) {
        return;
      }

      messages = [];
      sessionId = null;
      saveMessagesLocal();
      renderMessages();

      // 添加新的欢迎消息
      addMessageToUI('assistant', `对话已清除。有什么新的话题想聊吗？`);
    }

    // 跳转到记忆时间线
    function goToMemory() {
      window.location.href = `memory.html?id=${dhId}`;
    }

    // V4 · 跳转到分享卡生成页
    function goToShareCard() {
      window.location.href = `share-card.html?id=${dhId}`;
    }

    // 设置
    function toggleSettings() {
      alert('设置功能开发中...');
    }

    // 页面加载
    window.addEventListener('load', function() {
      // 检查登录状态
      if (!MindPalAuth.requireLogin(window.location.href)) {
        return;
      }
      loadDigitalHuman();
    });
  </script>

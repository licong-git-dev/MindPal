version: '3.8'

services:
  # 后端服务（主线：backend_v2 / FastAPI）
  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    container_name: mindpal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend_v2/.env
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
    networks:
      - mindpal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mindpal-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mindpal-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mindpal-network:
    driver: bridge

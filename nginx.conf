# MindPal · nginx 配置（生产 + 本地通用）
#
# 生产部署：放在 /etc/nginx/sites-available/mindpal，软链到 sites-enabled/
# 或者作为 docker-compose 反向代理放在前置容器
#
# 修改要点（首次部署必看）：
#   1. server_name        改成你的真实域名（或保留 _ 当 catch-all）
#   2. proxy_pass         backend 服务名/地址：docker compose 内是 http://backend:8000；
#                         裸机部署是 http://127.0.0.1:8000
#   3. 前端静态目录       默认 /usr/share/nginx/html；裸机部署改成 /opt/mindpal/frontend
#   4. HTTPS 部署：       去掉下方 listen 80 的 default_server，加上 listen 443 ssl
#                         + ssl_certificate / ssl_certificate_key（阿里云 SSL 服务有免费证书）

upstream mindpal_backend {
    # backend_v2 (FastAPI) 默认监听 8000
    server backend:8000;       # docker-compose 内部网络
    # server 127.0.0.1:8000;   # 裸机部署改用此行

    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;             # 改成你的生产域名，例如 mindpal.example.com

    # 文件上传上限（知识库上传）
    client_max_body_size 50M;

    # 默认日志
    access_log /var/log/nginx/mindpal_access.log;
    error_log  /var/log/nginx/mindpal_error.log;

    # ============ 安全响应头 ============
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ============ Gzip 压缩 ============
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
    gzip_disable "msie6";

    # ============ 前端静态资源 ============
    location / {
        # 生产路径：把仓库 frontend/ 整个 rsync 到这里
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 长缓存：CSS / JS / 图片 / 字体
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }

        # HTML 不缓存（确保改完页面立刻生效）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }

    # ============ API · 普通端点 ============
    location /api/ {
        proxy_pass         http://mindpal_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 普通 API 超时
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ============ API · SSE 流式（关键！）============
    # /api/v1/digital-humans/{id}/chat/stream 等流式端点必须用这个 location
    # 关闭 buffering、禁用 cache、给足超时（流式生成可能 60s+）
    location ~ ^/api/v1/(digital-humans/[0-9]+/chat/stream|chat/stream) {
        proxy_pass         http://mindpal_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE 关键设置：禁缓冲、禁缓存、传 chunked
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;

        # 流式生成可能很长
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ============ 健康检查 ============
    location = /health {
        access_log off;
        proxy_pass http://mindpal_backend/health;
        proxy_set_header Host $host;
    }

    # robots.txt 兜底（避免 404 在日志里刷屏）
    location = /robots.txt {
        access_log off;
        log_not_found off;
        return 200 "User-agent: *\nDisallow: /api/\n";
    }

    # 拒绝直接访问 .env / .git 等敏感路径
    location ~ /\.(env|git|svn|htaccess) {
        deny all;
        return 404;
    }
}

# MindPal V2 Docker Compose
# 包含后端API、PostgreSQL、Redis、Qdrant

version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: mindpal_postgres
    environment:
      POSTGRES_USER: mindpal
      POSTGRES_PASSWORD: mindpal123
      POSTGRES_DB: mindpal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindpal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindpal_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: mindpal_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindpal_network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: mindpal_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - mindpal_network

  # FastAPI 后端
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindpal_backend_v2
    environment:
      - DATABASE_URL=postgresql+asyncpg://mindpal:mindpal123@postgres:5432/mindpal
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - mindpal_network
    restart: unless-stopped

  # ROI-7 主动消息生成器（每天 10:00 跑一次）
  # 使用 entrypoint 守护进程：sleep 到下个 10 点 → 跑 → 再 sleep
  # 不引入 celery beat / supervisord 等额外依赖，保留运维简单度
  proactive_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindpal_proactive_worker
    command: >
      sh -c '
        while true; do
          NOW=$$(date +%s);
          NEXT=$$(date -d "today 10:00" +%s);
          if [ "$$NEXT" -le "$$NOW" ]; then
            NEXT=$$(date -d "tomorrow 10:00" +%s);
          fi;
          SLEEP=$$((NEXT - NOW));
          echo "[proactive_worker] sleeping $$SLEEP seconds until next 10:00";
          sleep $$SLEEP;
          python -m scripts.generate_proactive_messages || echo "[proactive_worker] run failed";
        done
      '
    environment:
      - DATABASE_URL=postgresql+asyncpg://mindpal:mindpal123@postgres:5432/mindpal
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - mindpal_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  mindpal_network:
    driver: bridge

# MindPal V2 Docker Compose
# 包含后端API、PostgreSQL、Redis、Qdrant

version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: mindpal_postgres
    environment:
      POSTGRES_USER: mindpal
      POSTGRES_PASSWORD: mindpal123
      POSTGRES_DB: mindpal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindpal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindpal_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: mindpal_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindpal_network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: mindpal_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - mindpal_network

  # FastAPI 后端
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindpal_backend_v2
    environment:
      - DATABASE_URL=postgresql+asyncpg://mindpal:mindpal123@postgres:5432/mindpal
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - mindpal_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  mindpal_network:
    driver: bridge
